<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doomniks Paradise | Staff Application</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="particles"></canvas>

<div class="wrapper">

<img src="logo.png" class="logo">

<div class="card">

<h1>STAFF APPLICATION</h1>

<form id="form">

<div class="field">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="field">
<label>Username Roblox / Discord</label>
<input type="text" id="username" required>
</div>

<div class="field">
<label>Nama Media Sosial Account</label>
<input type="text" id="social" required>
</div>

<div class="field">
<label>Apakah anda mengetahui tugas staff/admin?</label>
<input type="text" id="task" required>
</div>

<div class="field">
<label>Apa alasan anda mau bergabung dengan tim kami?</label>
<textarea id="reason" required></textarea>
</div>

<button id="submit">Kirim Pengajuan</button>

</form>

<div class="status" id="status"></div>

</div>

</div>

<script src="particles.js"></script>
<script src="script.js"></script>

</body>
</html>
